map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream opencode_cowork_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

############## HTTPS SERVER ##############
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name oc.tokopawon.id;

    client_max_body_size 10M;

    ssl_certificate /etc/letsencrypt/live/oc.tokopawon.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oc.tokopawon.id/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # OCSP Stapling - faster SSL handshake
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/vnd.geo+json
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/bmp
        image/svg+xml
        image/x-icon
        text/cache-manifest
        text/css
        text/plain
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy
        text/xml;

    ########### PROXY SETTINGS ###########
    location / {
        proxy_pass http://opencode_cowork_backend;

        # Standard Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket Support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Timeout
        proxy_read_timeout 90;
        proxy_connect_timeout 90;
        proxy_send_timeout 90;
    }
}

############## HTTP SERVER ##############
server {
    listen 80;
    listen [::]:80;
    server_name oc.tokopawon.id;

    # Memastikan certbot renew tetap bisa lewat port 80 jika pakai metode webroot
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
