map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream opencode_cowork_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

 

############## HTTP SERVER ##############
server {
    listen 80;
    listen [::]:80;
    server_name oc.tokopawon.id;

    # Memastikan certbot renew tetap bisa lewat port 80 jika pakai metode webroot
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
